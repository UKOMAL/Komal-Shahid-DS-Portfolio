<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Colorful Canvas — Anamorphic 3D Billboard (DSC680)</title>
  <meta name="description" content="Real-time anamorphic 3D billboard effect using Three.js WebGL — content appears to break out of a corner LED screen.">
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    html,body{width:100%;height:100%;overflow:hidden;background:#050510}
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif}
    #c{width:100%;height:100%;display:block}
    .top{position:fixed;top:0;left:0;right:0;padding:14px 20px;display:flex;align-items:center;justify-content:space-between;z-index:10;background:linear-gradient(180deg,rgba(5,5,16,.9) 0%,transparent 100%);pointer-events:none}
    .top>*{pointer-events:auto}
    .top .t{color:#e0e6ed;font-size:.95rem;font-weight:700;letter-spacing:-.3px}
    .top .t span{background:linear-gradient(135deg,#38bdf8,#a78bfa,#f472b6);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
    .top .r{color:#475569;font-size:.8rem}
    .top .r a{color:#7dd3fc;text-decoration:underline;text-underline-offset:2px}
    .info{position:fixed;bottom:20px;left:20px;background:rgba(10,15,30,.88);border:1px solid rgba(56,189,248,.15);border-radius:14px;padding:18px;min-width:210px;z-index:10;backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px)}
    .info h3{color:#e2e8f0;font-size:.82rem;margin-bottom:10px;font-weight:600;text-transform:uppercase;letter-spacing:.5px}
    .info .row{display:flex;justify-content:space-between;margin-bottom:5px;font-size:.8rem;color:#64748b}
    .info .row .v{color:#a78bfa;font-family:'SF Mono','Cascadia Code',monospace;font-size:.78rem}
    .sw{margin-top:10px;padding:7px 10px;border-radius:8px;text-align:center;font-weight:600;font-size:.76rem;letter-spacing:.3px;transition:all .3s}
    .sw.on{background:rgba(34,197,94,.12);color:#4ade80;border:1px solid rgba(34,197,94,.25)}
    .sw.off{background:rgba(239,68,68,.10);color:#f87171;border:1px solid rgba(239,68,68,.2)}
    .ctrls{position:fixed;bottom:20px;right:20px;z-index:10;display:flex;flex-direction:column;gap:8px}
    .cb{background:rgba(10,15,30,.88);border:1px solid rgba(56,189,248,.15);color:#e2e8f0;padding:10px 18px;border-radius:10px;cursor:pointer;font-size:.82rem;font-weight:600;backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);transition:all .2s;font-family:inherit}
    .cb:hover{border-color:rgba(56,189,248,.4);background:rgba(15,23,42,.95)}
    .cb.pri{background:linear-gradient(135deg,rgba(14,165,233,.75),rgba(124,58,237,.75));border-color:transparent}
    .cb.pri:hover{opacity:.9}
    .hint{position:fixed;top:60px;left:50%;transform:translateX(-50%);background:rgba(10,15,30,.8);border:1px solid rgba(167,139,250,.2);color:#94a3b8;padding:8px 18px;border-radius:20px;font-size:.78rem;z-index:10;backdrop-filter:blur(8px);transition:opacity .8s;pointer-events:none}
    @media(max-width:600px){.info{bottom:auto;top:60px;left:10px;right:10px;min-width:0}.ctrls{bottom:20px;right:10px;flex-direction:row}.slider-wrap{display:none}}
    #loader{position:fixed;inset:0;z-index:100;background:#050510;display:flex;flex-direction:column;align-items:center;justify-content:center;transition:opacity .8s ease}
    #loader .ld-title{font-size:1.8rem;font-weight:700;background:linear-gradient(135deg,#38bdf8,#a78bfa,#f472b6);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:24px}
    #loader .ld-sub{color:#475569;font-size:.85rem;margin-bottom:20px}
    #loader .ld-spin{width:36px;height:36px;border:3px solid rgba(56,189,248,.15);border-top-color:#38bdf8;border-radius:50%;animation:ldSpin .8s linear infinite}
    @keyframes ldSpin{to{transform:rotate(360deg)}}
    #flash{position:fixed;inset:0;background:rgba(255,255,255,.85);opacity:0;pointer-events:none;z-index:50}
    .slider-wrap{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);z-index:10;display:flex;align-items:center;gap:12px;background:rgba(10,15,30,.88);border:1px solid rgba(56,189,248,.15);border-radius:14px;padding:10px 20px;backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px)}
    .slider-wrap label{color:#64748b;font-size:.76rem;white-space:nowrap}
    .slider-wrap .sv{color:#a78bfa;font-family:'SF Mono','Cascadia Code',monospace;font-size:.78rem;min-width:48px;text-align:center}
    .slider-track{position:relative;width:260px;height:20px;display:flex;align-items:center}
    .slider-track input[type=range]{-webkit-appearance:none;appearance:none;width:100%;height:4px;background:rgba(56,189,248,.15);border-radius:2px;outline:none;cursor:pointer}
    .slider-track input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:16px;height:16px;border-radius:50%;background:linear-gradient(135deg,#38bdf8,#a78bfa);border:2px solid rgba(255,255,255,.2);cursor:grab;box-shadow:0 0 6px rgba(56,189,248,.4)}
    .slider-track input[type=range]::-moz-range-thumb{width:16px;height:16px;border-radius:50%;background:linear-gradient(135deg,#38bdf8,#a78bfa);border:2px solid rgba(255,255,255,.2);cursor:grab}
    .slider-notch{position:absolute;width:2px;height:12px;background:#4ade80;border-radius:1px;top:50%;transform:translateY(-50%);pointer-events:none;opacity:.8}
  </style>
</head>
<body>
  <canvas id="c"></canvas>

  <div id="loader">
    <div class="ld-title">Colorful Canvas</div>
    <div class="ld-sub">Loading 3D scene&hellip;</div>
    <div class="ld-spin"></div>
  </div>
  <div id="flash"></div>

  <div class="top">
    <div class="t"><span>Colorful Canvas</span> — Anamorphic 3D Billboard</div>
    <div class="r">DSC680 · Bellevue University · <a href="https://github.com/UKOMAL/Komal-Shahid-DS-Portfolio/tree/main/projects/project3-colorful-canvas" target="_blank" rel="noopener">GitHub</a></div>
  </div>

  <div class="info">
    <h3>Camera</h3>
    <div class="row"><span>Azimuth</span><span class="v" id="iAz">0°</span></div>
    <div class="row"><span>Elevation</span><span class="v" id="iEl">0°</span></div>
    <div class="row"><span>Distance</span><span class="v" id="iDist">0.0</span></div>
    <div id="swInd" class="sw off">Away from sweet spot</div>
  </div>

  <div class="ctrls">
    <button class="cb pri" id="btnSw">&#9673; Sweet Spot</button>
    <button class="cb" id="btnRst">&#8634; Reset</button>
    <button class="cb" id="btnCap">&#128248; Capture</button>
    <button class="cb" id="btnFlat">&#128260; 3D Anamorphic</button>
  </div>

  <div class="slider-wrap">
    <label>Angle</label>
    <div class="slider-track">
      <input type="range" id="angleSlider" min="-180" max="180" step="0.5" value="17">
      <div class="slider-notch" id="sliderNotch"></div>
    </div>
    <span class="sv" id="sliderVal">17&deg;</span>
  </div>

  <div class="hint" id="hint">Orbit to explore &middot; Click &ldquo;Sweet Spot&rdquo; for the 3D illusion</div>

  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.168.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.168.0/examples/jsm/"
    }
  }
  </script>

  <script type="module">
  import * as THREE from 'three';
  import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
  import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
  import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
  import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
  import { OutputPass } from 'three/addons/postprocessing/OutputPass.js';
  import { ShaderPass } from 'three/addons/postprocessing/ShaderPass.js';
  import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

  const FW = 8, FH = 4.5, SW = 3, SH = FH, BZ = 0.12;
  const SWEET_POS = new THREE.Vector3(5.5, 0.8, 9);
  const SWEET_TGT = new THREE.Vector3(2.5, -0.2, -0.5);
  const PORTAL_BG = new THREE.Color(0x020208);

  /* ── Renderer ── */
  const canvas = document.getElementById('c');
  const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, preserveDrawingBuffer: true });
  renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
  renderer.setSize(innerWidth, innerHeight);
  renderer.toneMapping = THREE.ACESFilmicToneMapping;
  renderer.toneMappingExposure = 1.35;
  renderer.shadowMap.enabled = true;
  renderer.shadowMap.type = THREE.PCFSoftShadowMap;
  renderer.localClippingEnabled = true;

  /* ── Scene + background ── */
  const scene = new THREE.Scene();
  {
    const c = document.createElement('canvas');
    c.width = 2; c.height = 512;
    const g = c.getContext('2d');
    const gr = g.createLinearGradient(0, 0, 0, 512);
    gr.addColorStop(0, '#0c0c2e');
    gr.addColorStop(0.35, '#0a1020');
    gr.addColorStop(0.65, '#0c0c18');
    gr.addColorStop(1, '#050508');
    g.fillStyle = gr;
    g.fillRect(0, 0, 2, 512);
    scene.background = new THREE.CanvasTexture(c);
  }

  /* ── Camera + controls ── */
  const camera = new THREE.PerspectiveCamera(45, innerWidth / innerHeight, 0.1, 100);
  camera.position.copy(SWEET_POS);
  const controls = new OrbitControls(camera, canvas);
  controls.target.copy(SWEET_TGT);
  controls.enableDamping = true;
  controls.dampingFactor = 0.08;
  controls.minDistance = 3;
  controls.maxDistance = 30;
  controls.maxPolarAngle = Math.PI * 0.7;
  controls.minPolarAngle = 0.2;
  controls.update();

  /* ── Environment map ── */
  function makeEnvMap() {
    const sz = 512, c = document.createElement('canvas');
    c.width = sz * 2; c.height = sz;
    const g = c.getContext('2d');
    const gr = g.createLinearGradient(0, 0, 0, sz);
    gr.addColorStop(0, '#0a0a30'); gr.addColorStop(0.4, '#101840');
    gr.addColorStop(0.6, '#0c1428'); gr.addColorStop(1, '#060610');
    g.fillStyle = gr; g.fillRect(0, 0, sz * 2, sz);
    [[200,180,60,'rgba(120,200,255,.35)'],
     [500,120,80,'rgba(255,110,220,.3)'],
     [800,200,50,'rgba(120,255,220,.22)'],
     [350,380,70,'rgba(255,210,120,.22)'],
     [650,300,55,'rgba(255,160,80,.18)'],
     [150,400,45,'rgba(180,120,255,.15)']].forEach(([x, y, r, col]) => {
      const rg = g.createRadialGradient(x, y, 0, x, y, r);
      rg.addColorStop(0, col); rg.addColorStop(1, 'transparent');
      g.fillStyle = rg; g.fillRect(x - r, y - r, r * 2, r * 2);
    });
    const t = new THREE.CanvasTexture(c);
    t.mapping = THREE.EquirectangularReflectionMapping;
    return t;
  }
  const envMap = makeEnvMap();
  scene.environment = envMap;

  /* ── Lighting (commercial-grade 5-point setup) ── */
  scene.add(new THREE.AmbientLight(0x303050, 0.4));

  const dLight = new THREE.DirectionalLight(0xfff8f0, 2.4);
  dLight.position.set(8, 12, 12);
  dLight.castShadow = true;
  dLight.shadow.mapSize.set(2048, 2048);
  dLight.shadow.camera.near = 1; dLight.shadow.camera.far = 40;
  dLight.shadow.camera.left = -12; dLight.shadow.camera.right = 12;
  dLight.shadow.camera.top = 8; dLight.shadow.camera.bottom = -8;
  dLight.shadow.bias = -0.0015;
  dLight.shadow.normalBias = 0.02;
  scene.add(dLight);

  const keySpot = new THREE.SpotLight(0xfff5e8, 3.5, 25, Math.PI * 0.18, 0.5, 1.2);
  keySpot.position.set(5, 6, 8);
  keySpot.target.position.set(3, -0.1, 0);
  keySpot.castShadow = true;
  keySpot.shadow.mapSize.set(1024, 1024);
  keySpot.shadow.bias = -0.001;
  scene.add(keySpot);
  scene.add(keySpot.target);

  scene.add(new THREE.DirectionalLight(0x6090ff, 0.7).translateX(-5).translateY(3).translateZ(8));

  const rimLight = new THREE.PointLight(0xd040ff, 3.5, 22);
  rimLight.position.set(-3, 3, -5);
  scene.add(rimLight);

  const warmFill = new THREE.PointLight(0xff9040, 1.8, 18);
  warmFill.position.set(2, -3, 4);
  scene.add(warmFill);

  const accentLight = new THREE.PointLight(0x40c8ff, 1.2, 15);
  accentLight.position.set(7, 1, -2);
  scene.add(accentLight);

  /* ── Billboard group ── */
  const bbGroup = new THREE.Group();
  scene.add(bbGroup);

  const frontFaceMat = new THREE.MeshBasicMaterial({ color: 0xffffff });
  const sideFaceMat  = new THREE.MeshBasicMaterial({ color: 0xffffff });

  const frontFace = new THREE.Mesh(new THREE.PlaneGeometry(FW, FH), frontFaceMat);
  frontFace.position.set(FW / 2, 0, 0);
  bbGroup.add(frontFace);

  const sideFace = new THREE.Mesh(new THREE.PlaneGeometry(SW, SH), sideFaceMat);
  sideFace.position.set(0, 0, -SW / 2);
  sideFace.rotation.y = Math.PI / 2;
  bbGroup.add(sideFace);

  /* ── Frame / bezel ── */
  const frameMat = new THREE.MeshStandardMaterial({ color: 0x1a1a28, metalness: 0.7, roughness: 0.3 });
  function makeFrame(w, h, t, d) {
    const grp = new THREE.Group();
    const bar = (bw, bh, bd, px, py) => {
      const m = new THREE.Mesh(new THREE.BoxGeometry(bw, bh, bd), frameMat);
      m.position.set(px, py, d / 2);
      grp.add(m);
    };
    bar(w + 2 * t, t, d, 0, h / 2 + t / 2);
    bar(w + 2 * t, t, d, 0, -h / 2 - t / 2);
    bar(t, h, d, -w / 2 - t / 2, 0);
    bar(t, h, d, w / 2 + t / 2, 0);
    return grp;
  }
  const fFrame = makeFrame(FW, FH, BZ, 0.2);
  fFrame.position.set(FW / 2, 0, 0);
  bbGroup.add(fFrame);
  const sFrame = makeFrame(SW, SH, BZ, 0.2);
  sFrame.position.set(0, 0, -SW / 2);
  sFrame.rotation.y = Math.PI / 2;
  bbGroup.add(sFrame);

  /* corner edge strip */
  const edgeMat = new THREE.MeshStandardMaterial({ color: 0x111118, metalness: 0.8, roughness: 0.2 });
  const edge = new THREE.Mesh(new THREE.BoxGeometry(0.15, FH + 2 * BZ, 0.15), edgeMat);
  edge.position.set(0, 0, 0);
  bbGroup.add(edge);

  /* ── Building walls behind billboard ── */
  const wallMat = new THREE.MeshStandardMaterial({ color: 0x14141c, roughness: 0.92 });
  const fWall = new THREE.Mesh(new THREE.BoxGeometry(FW + 4, FH + 8, 0.6), wallMat);
  fWall.position.set(FW / 2 + 1, 1, -0.5);
  fWall.receiveShadow = true;
  bbGroup.add(fWall);
  const sWall = new THREE.Mesh(new THREE.BoxGeometry(0.6, SH + 8, SW + 4), wallMat);
  sWall.position.set(-0.5, 1, -SW / 2 - 1);
  sWall.receiveShadow = true;
  bbGroup.add(sWall);

  /* ── Floor ── */
  const floorY = -FH / 2 - BZ - 0.5;
  const floor = new THREE.Mesh(
    new THREE.PlaneGeometry(60, 60),
    new THREE.MeshPhysicalMaterial({ color: 0x0a0a12, roughness: 0.85, metalness: 0.1, envMap, envMapIntensity: 0.15 })
  );
  floor.rotation.x = -Math.PI / 2;
  floor.position.y = floorY;
  floor.receiveShadow = true;
  scene.add(floor);

  const reflDisc = new THREE.Mesh(
    new THREE.CircleGeometry(5, 64),
    new THREE.MeshPhysicalMaterial({
      color: 0x0a0a16, roughness: 0.12, metalness: 0.3,
      envMap, envMapIntensity: 0.9, clearcoat: 0.5, clearcoatRoughness: 0.15,
    })
  );
  reflDisc.rotation.x = -Math.PI / 2;
  reflDisc.position.set(3, floorY + 0.002, -0.5);
  reflDisc.receiveShadow = true;
  scene.add(reflDisc);

  /* ── Clipping planes ── */
  const portalClipFront = new THREE.Plane(new THREE.Vector3(0, 0, -1), 0.005);
  const portalClipSide  = new THREE.Plane(new THREE.Vector3(-1, 0, 0), 0.005);
  const mainClipZ = new THREE.Plane(new THREE.Vector3(0, 0, 1), 0.005);
  const mainClipX = new THREE.Plane(new THREE.Vector3(1, 0, 0), 0.005);

  /* ── 3D Content: Juice Bottle + Fruit Burst ── */
  const contentMats = [];

  /* ── Shared fruit materials (vivid LED-screen style) ── */
  const orangeRindMat = new THREE.MeshPhysicalMaterial({
    color: 0xffa000, roughness: 0.18, envMap, envMapIntensity: 1.6,
    clearcoat: 0.8, clearcoatRoughness: 0.08,
    emissive: 0xff7700, emissiveIntensity: 0.15,
  });
  contentMats.push(orangeRindMat);
  const orangeFleshMat = new THREE.MeshPhysicalMaterial({
    color: 0xffb050, emissive: 0xff7700, emissiveIntensity: 0.35,
    roughness: 0.25, envMap, envMapIntensity: 0.9,
    transmission: 0.12, thickness: 0.6, sheen: 0.3, sheenColor: new THREE.Color(0xffcc80),
  });
  contentMats.push(orangeFleshMat);
  const limeRindMat = new THREE.MeshPhysicalMaterial({
    color: 0x40e040, roughness: 0.18, envMap, envMapIntensity: 1.6,
    clearcoat: 0.8, clearcoatRoughness: 0.08,
    emissive: 0x10dd10, emissiveIntensity: 0.15,
  });
  contentMats.push(limeRindMat);
  const limeFleshMat = new THREE.MeshPhysicalMaterial({
    color: 0xa0ff98, emissive: 0x50ff50, emissiveIntensity: 0.30,
    roughness: 0.22, envMap, envMapIntensity: 0.9,
    transmission: 0.18, thickness: 0.6, sheen: 0.3, sheenColor: new THREE.Color(0xc0ffc0),
  });
  contentMats.push(limeFleshMat);
  const berryMat = new THREE.MeshPhysicalMaterial({
    color: 0xff2050, roughness: 0.2, envMap, envMapIntensity: 1.5,
    clearcoat: 0.9, clearcoatRoughness: 0.1,
    emissive: 0xdd0020, emissiveIntensity: 0.18,
    sheen: 0.4, sheenColor: new THREE.Color(0xff6080),
  });
  contentMats.push(berryMat);
  const leafMat = new THREE.MeshPhysicalMaterial({
    color: 0x2aaa2a, roughness: 0.3, envMap, envMapIntensity: 0.8,
    clearcoat: 0.4, clearcoatRoughness: 0.2,
    emissive: 0x0a5510, emissiveIntensity: 0.05,
  });
  contentMats.push(leafMat);

  /* ── Juice Bottle ── */
  const bottleGroup = new THREE.Group();
  bottleGroup.position.set(3.0, -0.1, 0.0);
  bottleGroup.rotation.x = -0.15;
  scene.add(bottleGroup);

  const bPts = [
    [0, -1.6], [0.48, -1.6], [0.52, -1.55], [0.56, -1.4],
    [0.60, -1.0], [0.62, -0.3], [0.62, 0.3], [0.58, 0.55],
    [0.48, 0.72], [0.36, 0.86], [0.24, 0.96], [0.24, 1.26],
    [0.29, 1.28], [0.29, 1.40], [0.25, 1.42], [0, 1.42],
  ].map(([x, y]) => new THREE.Vector2(x, y));
  const glassMat = new THREE.MeshPhysicalMaterial({
    color: 0xf0fff0, transmission: 0.96, thickness: 2.0,
    roughness: 0.02, ior: 1.5, envMap, envMapIntensity: 2.8,
    clearcoat: 1.0, clearcoatRoughness: 0.02,
    specularIntensity: 1.5, specularColor: new THREE.Color(0xffffff),
    attenuationColor: new THREE.Color(0xe0ffe0), attenuationDistance: 3.0,
  });
  contentMats.push(glassMat);
  const bottleBody = new THREE.Mesh(new THREE.LatheGeometry(bPts, 64), glassMat);
  bottleBody.castShadow = true;
  bottleGroup.add(bottleBody);

  const liqPts = [
    [0, -1.52], [0.44, -1.52], [0.48, -1.45], [0.52, -1.25],
    [0.55, -0.85], [0.56, -0.2], [0.56, 0.25], [0.52, 0.45],
    [0.44, 0.52], [0, 0.52],
  ].map(([x, y]) => new THREE.Vector2(x, y));
  const liqMat = new THREE.MeshPhysicalMaterial({
    color: 0xff7830, transmission: 0.35, thickness: 3.0,
    roughness: 0.12, ior: 1.36, emissive: 0xff5500,
    emissiveIntensity: 0.30, envMap, envMapIntensity: 1.0,
    attenuationColor: new THREE.Color(0xff6010), attenuationDistance: 1.5,
    side: THREE.DoubleSide,
  });
  contentMats.push(liqMat);
  bottleGroup.add(new THREE.Mesh(new THREE.LatheGeometry(liqPts, 64), liqMat));

  const capMat = new THREE.MeshPhysicalMaterial({
    color: 0xff1838, metalness: 0.95, roughness: 0.08,
    envMap, envMapIntensity: 3.5, clearcoat: 1.0, clearcoatRoughness: 0.03,
    emissive: 0x880010, emissiveIntensity: 0.08,
  });
  contentMats.push(capMat);
  const cap = new THREE.Mesh(new THREE.CylinderGeometry(0.31, 0.28, 0.24, 32), capMat);
  cap.position.y = 1.54;
  bottleGroup.add(cap);

  const nrMat = new THREE.MeshPhysicalMaterial({
    color: 0xe0e0e0, metalness: 0.98, roughness: 0.04,
    envMap, envMapIntensity: 3.0, clearcoat: 1.0,
  });
  contentMats.push(nrMat);
  const neckRing = new THREE.Mesh(new THREE.TorusGeometry(0.27, 0.03, 12, 32), nrMat);
  neckRing.position.y = 1.27;
  neckRing.rotation.x = Math.PI / 2;
  bottleGroup.add(neckRing);

  function makeLabelTex() {
    const cv = document.createElement('canvas');
    cv.width = 1024; cv.height = 512;
    const g = cv.getContext('2d');
    const gr = g.createLinearGradient(0, 0, 0, 512);
    gr.addColorStop(0, '#ff8030'); gr.addColorStop(0.35, '#ff5010');
    gr.addColorStop(0.65, '#ff4500'); gr.addColorStop(1, '#cc3600');
    g.fillStyle = gr; g.fillRect(0, 0, 1024, 512);
    g.strokeStyle = 'rgba(255,255,255,0.25)';
    g.lineWidth = 5; g.strokeRect(35, 35, 954, 442);
    g.fillStyle = '#ffffff';
    g.shadowColor = 'rgba(0,0,0,0.5)';
    g.shadowBlur = 14; g.shadowOffsetY = 4;

  function makeBerryTex() {
    const cv = document.createElement('canvas');

    rg.addColorStop(0, '#ff2040'); rg.addColorStop(0.4, '#ff1030');
    rg.addColorStop(0.7, '#dd0820'); rg.addColorStop(1, '#aa0618');
    ctx.fillStyle = rg; ctx.fillRect(0, 0, 512, 512);
    for (let row = 0; row < 12; row++) {
      for (let col = 0; col < 8; col++) {
        const sx = (col + (row % 2) * 0.5) * 64 + 16;

  /* ── Fruit piece constructors (realistic) ── */
  function makeOrangeSlice() {
    const g = new THREE.Group();
    const arc = Math.PI / 3, R = 0.48, rw = 0.05, d = 0.09;

    const shape = new THREE.Shape();
    shape.moveTo(0, 0);
    shape.absarc(0, 0, R - rw, -arc / 2, arc / 2, false);
    shape.lineTo(0, 0);
    const flesh = new THREE.Mesh(
      new THREE.ExtrudeGeometry(shape, {
        depth: d, bevelEnabled: true,
        bevelThickness: 0.012, bevelSize: 0.012, bevelSegments: 3,
      }),
      orangeFleshTexMat
    );
    flesh.position.z = -d / 2;
    g.add(flesh);

    const rs = new THREE.Shape();
    rs.absarc(0, 0, R, -arc / 2, arc / 2, false);
    rs.absarc(0, 0, R - rw, arc / 2, -arc / 2, true);
    rs.closePath();
    const rind = new THREE.Mesh(
      new THREE.ExtrudeGeometry(rs, {
        depth: d + 0.01, bevelEnabled: true,
        bevelThickness: 0.006, bevelSize: 0.006, bevelSegments: 2,
      }),
      orangeRindMat
    );
    rind.position.z = -d / 2 - 0.005;
    g.add(rind);

    for (let i = 1; i < 8; i++) {
      const a = -arc / 2 + (i / 8) * arc;
      const len = (R - rw) * 0.88;
      const strip = new THREE.Mesh(
        new THREE.BoxGeometry(len, 0.004, d * 0.8), orangeMemMat
      );
      strip.position.set(Math.cos(a) * len * 0.5, Math.sin(a) * len * 0.5, 0);
      strip.rotation.z = a;
      g.add(strip);
    }

    return g;
  }

  function setupPortalCam(cam, eye, corners) {
    cam.position.copy(eye);
    const center = new THREE.Vector3();
    corners.forEach(c => center.add(c));
    center.divideScalar(corners.length);
    cam.lookAt(center);
    cam.updateMatrixWorld(true);

    const vm = cam.matrixWorldInverse;
    const near = 0.1, far = 50;
    let l = Infinity, r = -Infinity, b = Infinity, t = -Infinity;
    corners.forEach(corner => {
      const v = corner.clone().applyMatrix4(vm);
      const s = near / Math.abs(v.z);
      l = Math.min(l, v.x * s);
      r = Math.max(r, v.x * s);
      b = Math.min(b, v.y * s);
      t = Math.max(t, v.y * s);
    });
    cam.projectionMatrix.makePerspective(l, r, t, b, near, far);
    cam.projectionMatrixInverse.copy(cam.projectionMatrix).invert();
  }

    const dist = dir.length();
    const az = Math.atan2(dir.x, dir.z) * (180 / Math.PI);
    const el = Math.asin(Math.min(1, Math.max(-1, dir.y / dist))) * (180 / Math.PI);
    elAz.textContent = az.toFixed(1) + '°';
    elEl.textContent = el.toFixed(1) + '°';
    elDist.textContent = dist.toFixed(1);
    const near = camera.position.distanceTo(SWEET_POS) < 2.0;
    elSw.className = 'sw ' + (near ? 'on' : 'off');
    elSw.textContent = near ? '● At sweet spot' : '○ Away from sweet spot';
    if (!sliderActive) {
      elSlider.value = az;
      elSliderVal.textContent = az.toFixed(0) + '\u00B0';
    }
  }

  /* ── Camera animation ── */
  let anim = null;
  function animateTo(pos, tgt) {
    const sp = camera.position.clone(), st = controls.target.clone();
    const t0 = performance.now(), dur = 1200;
    anim = { sp, st, ep: pos, et: tgt, t0, dur };
  }
  function tickAnim() {
    if (!anim) return;
    const t = Math.min((performance.now() - anim.t0) / anim.dur, 1);
    const e = t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2;
    camera.position.lerpVectors(anim.sp, anim.ep, e);
    controls.target.lerpVectors(anim.st, anim.et, e);
    controls.update();
    if (t >= 1) anim = null;
  }

  document.getElementById('btnSw').addEventListener('click', () => animateTo(SWEET_POS, SWEET_TGT));
  document.getElementById('btnRst').addEventListener('click', () =>
    animateTo(new THREE.Vector3(10, 5, 14), new THREE.Vector3(2, 0, -1))
  );

  /* ── Screenshot Capture ── */
  document.getElementById('btnCap').addEventListener('click', () => {
    renderPortals();
    composer.render();
    const dataURL = renderer.domElement.toDataURL('image/png');
    const link = document.createElement('a');
    link.download = 'anamorphic-billboard-capture.png';
    link.href = dataURL;
    link.click();
    elFlash.style.transition = 'none';
    elFlash.style.opacity = '0.85';
    void elFlash.offsetWidth;
    elFlash.style.transition = 'opacity 0.4s ease';
    elFlash.style.opacity = '0';
  });

  /* ── Before/After Toggle (3D / Flat) ── */
  let flatMode = false;
  let flatBlend = 0;
  let flatT0 = -1;
  const FLAT_DUR = 800;
  const flatData = {
    bottleOrigZ: bottleGroup.position.z,
    bottleFlatZ: -0.5,
    fruits: fruitPieces.map(f => ({ origZ: f.mesh.position.z, flatZ: Math.min(f.mesh.position.z, -0.2) })),
    drops: droplets.map(d => ({ origZ: d.basePos.z, flatZ: Math.min(d.basePos.z, -0.2) })),
    splashes: splashStrips.map(s => ({ origZ: s.mesh.position.z, flatZ: -2.0 })),
  };

  btnFlat.addEventListener('click', () => {
    flatMode = !flatMode;
    flatT0 = performance.now();
    btnFlat.innerHTML = flatMode ? '&#128260; Flat View' : '&#128260; 3D Anamorphic';
  });

  function tickFlatTransition() {
    if (flatT0 < 0) return;
    const elapsed = performance.now() - flatT0;
    const raw = Math.min(elapsed / FLAT_DUR, 1);
    const ease = raw < 0.5 ? 4 * raw * raw * raw : 1 - Math.pow(-2 * raw + 2, 3) / 2;
    flatBlend = flatMode ? ease : 1 - ease;
    if (raw >= 1) flatT0 = -1;
  }

  function applyFlatBlend() {
    bottleGroup.position.z = THREE.MathUtils.lerp(flatData.bottleOrigZ, flatData.bottleFlatZ, flatBlend);
    flatData.fruits.forEach((fd, i) => {
      fruitPieces[i].mesh.position.z = THREE.MathUtils.lerp(fd.origZ, fd.flatZ, flatBlend);
    });
    flatData.drops.forEach((fd, i) => {
      droplets[i].mesh.position.z = THREE.MathUtils.lerp(fd.origZ, fd.flatZ, flatBlend);
    });
    flatData.splashes.forEach((fd, i) => {
      splashStrips[i].mesh.position.z = THREE.MathUtils.lerp(fd.origZ, fd.flatZ, flatBlend);
    });
  }

  /* ── Loading screen ── */
  let loaderDone = false;

  /* ── Animation loop ── */
  const clock = new THREE.Clock();
  (function animate() {
    requestAnimationFrame(animate);
    clock.getDelta();
    const t = clock.elapsedTime;

    if (!loaderDone) {
      loaderDone = true;
      elLoader.style.opacity = '0';
      setTimeout(() => { elLoader.remove(); }, 900);
    }

    bottleGroup.rotation.y = t * 0.1;
    bottleGroup.rotation.x = -0.15 + Math.sin(t * 0.25) * 0.03;
    bottleGroup.position.y = -0.1 + Math.sin(t * 0.35) * 0.05;

    fruitPieces.forEach(f => {
      f.mesh.position.y = f.baseY + Math.sin(t * f.bobSpd + f.phase) * f.bobAmp;
      if (!f.stationary) {
        f.mesh.rotation.x = f.baseRot[0] + Math.sin(t * 0.3 + f.phase) * 0.025;
        f.mesh.rotation.z = f.baseRot[2] + Math.cos(t * 0.25 + f.phase) * 0.02;
      }
    });

    droplets.forEach(d => {
      d.mesh.position.y = d.basePos.y + Math.sin(t * d.driftSpd + d.phase) * d.driftAmp;
      d.mesh.position.x = d.basePos.x + Math.cos(t * d.driftSpd * 0.7 + d.phase) * d.driftAmp * 0.4;
    });

    splashStrips.forEach(s => {
      const p = 1 + Math.sin(t * s.pulseSpd + s.phase) * 0.04;
      s.mesh.scale.setScalar(p);
    });

    /* Floating particles drift */
    const posArr = particleGeo.attributes.position.array;
    for (let i = 0; i < particleCount; i++) {
      const d = particleDrifts[i];
      const b = i * 3;
      posArr[b]     = particleInitPos[b]     + Math.sin(t * d.sx + d.ph) * 0.15;
      posArr[b + 1] = particleInitPos[b + 1] + Math.cos(t * d.sy + d.ph) * 0.12;
      posArr[b + 2] = particleInitPos[b + 2] + Math.sin(t * d.sz + d.ph + 1.0) * 0.08;
    }
    particleGeo.attributes.position.needsUpdate = true;

    /* Flat-mode transition */
    tickFlatTransition();
    applyFlatBlend();

    tickAnim();
    controls.update();
    renderPortals();
    composer.render();
    updateUI();
  })();

  /* ── Resize ── */
  window.addEventListener('resize', () => {
    camera.aspect = innerWidth / innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(innerWidth, innerHeight);
    composer.setSize(innerWidth, innerHeight);
  });
  </script>
</body>
</html>
