<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 800" preserveAspectRatio="xMidYMid slice">
  <defs>
    <!-- Deep blue to near-black gradient matching brand tokens -->
    <linearGradient id="heroBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0B3D91;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0F1724;stop-opacity:1" />
    </linearGradient>
    <!-- Subtle dot grid pattern for data-centric feel -->
    <pattern id="dotGrid" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="20" cy="20" r="1.5" fill="#00A3FF" opacity="0.15"/>
    </pattern>
    <!-- Accent glow for the primary metric zone -->
    <radialGradient id="accentGlow" cx="50%" cy="50%" r="40%">
      <stop offset="0%" style="stop-color:#00A3FF;stop-opacity:0.08" />
      <stop offset="100%" style="stop-color:#0B3D91;stop-opacity:0" />
    </radialGradient>
  </defs>

  <!-- Background fill -->
  <rect width="1440" height="800" fill="url(#heroBg)"/>

  <!-- Dot grid overlay -->
  <rect width="1440" height="800" fill="url(#dotGrid)"/>

  <!-- Central glow effect behind metric/tagline -->
  <ellipse cx="720" cy="400" rx="600" ry="350" fill="url(#accentGlow)"/>

  <!-- Decorative: data-line motifs (neural network style, abstract) -->
  <!-- Left cluster -->
  <g opacity="0.12" stroke="#00A3FF" stroke-width="1" fill="none">
    <line x1="80" y1="200" x2="200" y2="350"/>
    <line x1="200" y1="350" x2="160" y2="480"/>
    <line x1="200" y1="350" x2="320" y2="300"/>
    <circle cx="80"  cy="200" r="4" fill="#00A3FF"/>
    <circle cx="200" cy="350" r="6" fill="#00A3FF"/>
    <circle cx="160" cy="480" r="4" fill="#00A3FF"/>
    <circle cx="320" cy="300" r="5" fill="#00A3FF"/>
  </g>

  <!-- Right cluster -->
  <g opacity="0.12" stroke="#00A3FF" stroke-width="1" fill="none">
    <line x1="1360" y1="180" x2="1240" y2="320"/>
    <line x1="1240" y1="320" x2="1280" y2="460"/>
    <line x1="1240" y1="320" x2="1120" y2="280"/>
    <circle cx="1360" cy="180" r="4" fill="#00A3FF"/>
    <circle cx="1240" cy="320" r="6" fill="#00A3FF"/>
    <circle cx="1280" cy="460" r="4" fill="#00A3FF"/>
    <circle cx="1120" cy="280" r="5" fill="#00A3FF"/>
  </g>

  <!-- Bottom-left connector -->
  <g opacity="0.08" stroke="#00A3FF" stroke-width="1" fill="none">
    <line x1="100" y1="600" x2="300" y2="650"/>
    <line x1="300" y1="650" x2="450" y2="580"/>
    <circle cx="100" cy="600" r="3" fill="#00A3FF"/>
    <circle cx="300" cy="650" r="4" fill="#00A3FF"/>
    <circle cx="450" cy="580" r="3" fill="#00A3FF"/>
  </g>

  <!--
    INSTRUCTIONS FOR DESIGNER / DEVELOPER:
    Replace this SVG with a high-quality hero image (PNG/WebP, 1440�800px).
    Recommended approach:
      1. Use a dark abstract data visualisation (e.g., neural network graph,
         heatmap, circuit board  AI-themed imagery).
      2. Apply a CSS overlay gradient (already in Hero.jsx __overlay div)
         so text always has sufficient contrast regardless of image content.
      3. Convert to WebP at 85% quality for performance.
      4. Add to <Hero bgImage="/assets/hero-bg.webp" /> prop.
    
    Free image sources: Unsplash (search "neural network", "abstract data"),
    Midjourney prompt: "abstract AI neural network data visualization,
    dark blue and cyan, minimal, high contrast, --ar 18:10"
  -->
</svg>
